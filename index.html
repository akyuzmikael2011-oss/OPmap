<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>City Info Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  display: flex;
  font-family: Arial;
}

#sidebar {
  width: 320px;
  background: #111;
  color: white;
  padding: 15px;
  overflow-y: auto;
}

#map {
  flex: 1;
  height: 100vh;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border: none;
}

.section {
  margin-top: 15px;
}
</style>
</head>

<body>

<div id="sidebar">
  <h2>Stadt Info</h2>

  <input id="cityInput" placeholder="Stadt eingeben..." />

  <div class="section">
    <b>Bürgermeister:</b>
    <div id="mayor">-</div>
  </div>

  <div class="section">
    <b>ÖPNV:</b>
    <div id="transport">-</div>
  </div>

  <div class="section">
    <b>Geschäfte (OSM):</b>
    <div id="shops">-</div>
  </div>
</div>

<div id="map"></div>

<script>
// Map
var map = L.map('map').setView([51.5, 7.45], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

// Enter Event
document.getElementById("cityInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    loadCity(this.value);
  }
});

async function loadCity(city) {

  // 1. Koordinaten holen (Nominatim)
  let geo = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}`);
  let geoData = await geo.json();

  if (!geoData[0]) return alert("Stadt nicht gefunden");

  let lat = geoData[0].lat;
  let lon = geoData[0].lon;

  map.setView([lat, lon], 13);

  // Marker
  L.marker([lat, lon]).addTo(map);

  // 2. Wikipedia Infos
  try {
    let wiki = await fetch(`https://de.wikipedia.org/api/rest_v1/page/summary/${city}`);
    let wikiData = await wiki.json();

    let text = wikiData.extract || "";

    // Bürgermeister rausfiltern (simple heuristic)
    let mayor = text.match(/Bürgermeister.*?\./);

    document.getElementById("mayor").innerText = mayor ? mayor[0] : "Nicht gefunden";
    document.getElementById("transport").innerText = "Infos aus Wikipedia prüfen";

  } catch {
    document.getElementById("mayor").innerText = "Fehler";
  }

  // 3. Shops via Overpass API
  let query = `
  [out:json];
  (
    node["shop"](around:3000,${lat},${lon});
  );
  out;
  `;

  let res = await fetch("https://overpass-api.de/api/interpreter", {
    method: "POST",
    body: query
  });

  let data = await res.json();

  document.getElementById("shops").innerText =
    data.elements.length + " Geschäfte gefunden";

}
</script>

</body>
</html>
