<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>City Intelligence</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0f172a;
}

/* Map */
#map {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* Glass UI */
#panel {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 320px;
  padding: 18px;

  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
}

/* Input */
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 15px;

  background: rgba(255,255,255,0.15);
  color: white;
}

/* Sections */
.box {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div id="panel">
  <input id="city" placeholder="Stadt eingeben..." />

  <div class="box">
    <b>Bürgermeister:</b>
    <div id="mayor">-</div>
  </div>

  <div class="box">
    <b>ÖPNV:</b>
    <div id="transport">-</div>
  </div>

  <div class="box">
    <b>Geschäfte:</b>
    <div id="shops">-</div>
  </div>
</div>

<div id="map"></div>

<script>
// INIT MAP
const map = L.map('map').setView([51.5, 7.45], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

// STATE
let marker;
let shopLayer = L.layerGroup().addTo(map);
let transportLayer = L.layerGroup().addTo(map);

// SEARCH
document.getElementById("city").addEventListener("keydown", async (e) => {
  if (e.key !== "Enter") return;

  const city = e.target.value.trim();
  if (!city) return;

  resetUI();

  try {
    // GEO
    const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}`);
    const geo = await geoRes.json();

    if (!geo[0]) throw "Stadt nicht gefunden";

    const lat = +geo[0].lat;
    const lon = +geo[0].lon;

    map.setView([lat, lon], 13);

    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lon]).addTo(map);

    // PARALLEL REQUESTS
    await Promise.all([
      loadMayor(city),
      loadShops(lat, lon),
      loadTransport(lat, lon)
    ]);

  } catch (err) {
    alert(err);
  }
});

// RESET
function resetUI() {
  document.getElementById("mayor").innerText = "Lade...";
  document.getElementById("transport").innerText = "Lade...";
  document.getElementById("shops").innerText = "Lade...";

  shopLayer.clearLayers();
  transportLayer.clearLayers();
}

// WIKIDATA MAYOR (clean)
async function loadMayor(city) {
  try {
    // Wikipedia → Wikidata ID
    const wiki = await fetch(`https://de.wikipedia.org/w/api.php?action=query&format=json&origin=*&titles=${city}&prop=pageprops`);
    const wikiData = await wiki.json();

    const page = Object.values(wikiData.query.pages)[0];
    const id = page.pageprops?.wikibase_item;

    if (!id) throw "Keine Wikidata-ID";

    // Wikidata Entity
    const entityRes = await fetch(`https://www.wikidata.org/wiki/Special:EntityData/${id}.json`);
    const entityData = await entityRes.json();

    const entity = entityData.entities[id];
    const mayorClaim = entity.claims?.P6;

    if (!mayorClaim) throw "Kein Bürgermeister";

    const mayorId = mayorClaim[0].mainsnak.datavalue.value.id;

    // Bürgermeister Name
    const mayorRes = await fetch(`https://www.wikidata.org/wiki/Special:EntityData/${mayorId}.json`);
    const mayorData = await mayorRes.json();

    const mayorEntity = mayorData.entities[mayorId];

    document.getElementById("mayor").innerText =
      mayorEntity.labels.de?.value ||
      mayorEntity.labels.en?.value ||
      "Unbekannt";

  } catch {
    document.getElementById("mayor").innerText = "Nicht verfügbar";
  }
}

// SHOPS
async function loadShops(lat, lon) {
  try {
    const res = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      body: `[out:json];node["shop"](around:3000,${lat},${lon});out;`
    });

    const data = await res.json();

    data.elements.slice(0, 100).forEach(s => {
      if (s.lat) {
        L.circleMarker([s.lat, s.lon], { radius: 3 })
          .addTo(shopLayer);
      }
    });

    document.getElementById("shops").innerText =
      data.elements.length + " gefunden";

  } catch {
    document.getElementById("shops").innerText = "Fehler";
  }
}

// ÖPNV
async function loadTransport(lat, lon) {
  try {
    const res = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      body: `[out:json];node["highway"="bus_stop"](around:3000,${lat},${lon});out;`
    });

    const data = await res.json();

    data.elements.slice(0, 100).forEach(t => {
      if (t.lat) {
        L.circleMarker([t.lat, t.lon], { radius: 4 })
          .addTo(transportLayer);
      }
    });

    document.getElementById("transport").innerText =
      data.elements.length + " Haltestellen";

  } catch {
    document.getElementById("transport").innerText = "Fehler";
  }
}
</script>

</body>
</html>
