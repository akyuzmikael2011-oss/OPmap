<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>City Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin: 0; font-family: Arial; }
#map { height: 100vh; }

#sidebar {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 300px;
  padding: 15px;

  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.2);
  border-radius: 12px;
  color: black;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div id="sidebar">
  <input id="city" placeholder="Stadt eingeben..." />
  <div><b>Bürgermeister:</b> <span id="mayor">-</span></div>
  <div><b>ÖPNV:</b> <span id="transport">-</span></div>
  <div><b>Shops:</b> <span id="shops">-</span></div>
</div>

<div id="map"></div>

<script>
let map = L.map('map').setView([51.5, 7.45], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
}).addTo(map);

let marker;
let shopLayer = L.layerGroup().addTo(map);
let transportLayer = L.layerGroup().addTo(map);

document.getElementById("city").addEventListener("keydown", async (e) => {
  if (e.key !== "Enter") return;

  let city = e.target.value;

  try {

    // GEO
    let geo = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}`);
    let geoData = await geo.json();

    if (!geoData[0]) {
      alert("Nicht gefunden");
      return;
    }

    let lat = +geoData[0].lat;
    let lon = +geoData[0].lon;

    map.setView([lat, lon], 13);

    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lon]).addTo(map);

    // RESET
    shopLayer.clearLayers();
    transportLayer.clearLayers();

    // SHOPS
    let shopRes = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      body: `[out:json];node["shop"](around:3000,${lat},${lon});out;`
    });

    let shopData = await shopRes.json();

    shopData.elements.slice(0, 100).forEach(s => {
      if (s.lat) {
        L.circleMarker([s.lat, s.lon], {radius: 3})
          .addTo(shopLayer);
      }
    });

    document.getElementById("shops").innerText = shopData.elements.length;

    // ÖPNV (Bus Stops)
    let transportRes = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      body: `[out:json];node["highway"="bus_stop"](around:3000,${lat},${lon});out;`
    });

    let transportData = await transportRes.json();

    transportData.elements.slice(0, 100).forEach(t => {
      if (t.lat) {
        L.circleMarker([t.lat, t.lon], {
          radius: 4
        }).addTo(transportLayer);
      }
    });

    document.getElementById("transport").innerText =
      transportData.elements.length + " Haltestellen";

    // Bürgermeister (einfach fallback)
    document.getElementById("mayor").innerText =
      "Siehe Wikipedia (nicht exakt abrufbar ohne Wikidata API)";

  } catch (err) {
    console.error(err);
    alert("Fehler beim Laden");
  }
});
</script>

</body>
</html>
